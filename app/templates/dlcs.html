<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" type="text/css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLCs</title>
    <script>
        function change_title(){
            var game_name = "{{ game_name }}";
            document.title = "DLCs do " + game_name;
        }
        function load_dlcs_ordered_by_price(){
            var game_id = "{{ game_id }}";
            var url = "https://exa618individualprojectpart2-production.up.railway.app/get_game_dlcs_ordered_by_price/" + game_id;
            var ajax = new XMLHttpRequest();

            ajax.open("GET", url, true);

            ajax.onload = function(){
                if (ajax.status === 200){
                    var jsonObj = JSON.parse(ajax.responseText);

                    var html = "";

                    jsonObj.forEach(function(item){
                        var dlc_cover = item.dlc_cover;
                        var dlc_id = item.dlc_id;
                        var dlc_name = item.dlc_name;
                        var dlc_url = item.dlc_url;

                        html += `
                        <div class="dlcs">
                            <img src="${dlc_cover}" alt="">
                            <a href="" class="dlc_name">${dlc_name}</a>
                            <a href="${dlc_url}">Acessar Página Steam</a>
                        </div>
                        `
                    });

                    document.getElementById("dlc-list").innerHTML = html;
                }
            }
            ajax.send();
        }

        function load_dlcs_ordered_by_release_date(){
            var game_id = "{{ game_id }}";
            var url = "https://exa618individualprojectpart2-production.up.railway.app/get_game_dlcs_ordered_by_release_date/" + game_id;
            var ajax = new XMLHttpRequest();

            ajax.open("GET", url, true);

            ajax.onload = function(){
                if (ajax.status === 200){
                    var jsonObj = JSON.parse(ajax.responseText);

                    var html = "";

                    jsonObj.forEach(function(item){
                        var dlc_cover = item.dlc_cover;
                        var dlc_id = item.dlc_id;
                        var dlc_name = item.dlc_name;
                        var dlc_url = item.dlc_url;

                        html += `
                        <div class="dlcs">
                            <img src="${dlc_cover}" alt="">
                            <a href="" class="dlc_name">${dlc_name}</a>
                            <a href="${dlc_url}">Acessar Página Steam</a>
                        </div>
                        `
                    });

                    document.getElementById("dlc-list").innerHTML = html;
                }
            }
            ajax.send();
        }

        function search_dlc(text){
            text = text.toLowerCase();

            var dlcs = document.querySelectorAll(".dlcs");

            dlcs.forEach(function(dlc){
                var dlc_name = dlc.querySelector(".dlc_name").innerText.toLowerCase();

                if(dlc_name.includes(text)){
                    dlc.style.display = "initial";
                }
                else{
                    dlc.style.display = "none";
                }
            });
        }
    </script>
</head>
<body onload="change_title(); load_dlcs_ordered_by_price();">
    <div class="header">
        <a id="header_text" href="/">
            <p id="page_name">Explorador de DLCs</p>
        </a>
        <div class="search-container">
            <input type="text" id="searchBar" onkeyup="search_dlc(this.value)" placeholder="Pesquise por DLC">
        </div>
    </div>

    <div id="dlc-list"></div>

    <div class="footer">© José Victor, 2026</div>
</body>
</html>
